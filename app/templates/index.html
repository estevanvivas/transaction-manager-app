<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Transacciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0a0a1a] text-white min-h-screen flex flex-col">

    <!-- ═══ Decorative blobs ═══ -->
    <div class="blob w-[400px] h-[400px] bg-purple-600/15 -top-32 -left-32 animate-pulse-slow"></div>
    <div class="blob w-[300px] h-[300px] bg-blue-600/10 bottom-0 -right-20 animate-pulse-slow delay-300"></div>

    <!-- ═══ Content ═══ -->
    <div class="flex-1 flex items-center justify-center relative z-10 px-6">
        <div class="text-center max-w-lg animate-fade-in-up">

            <!-- Icon -->
            <div class="w-16 h-16 rounded-2xl gradient-primary flex items-center justify-center mx-auto mb-8">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
            </div>

            <!-- Title -->
            <h1 class="text-3xl md:text-4xl font-bold mb-4">
                Gestor de Transacciones
            </h1>

            <p class="text-white/40 text-base mb-10 max-w-sm mx-auto leading-relaxed">
                Realiza depósitos, retiros y transferencias. Consulta tu saldo y movimientos en tiempo real.
            </p>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="/login"
                   class="btn-primary px-8 py-3 rounded-xl text-sm font-semibold text-white">
                    Iniciar Sesión
                </a>
                <a href="/login?tab=register"
                   class="btn-secondary px-8 py-3 rounded-xl text-sm font-medium text-white/70">
                    Registro
                </a>
            </div>
        </div>
    </div>

    <!-- ═══ Footer ═══ -->
    <footer class="relative z-10 py-6 text-center">
        <p class="text-xs text-white/20">Gestor de Transacciones</p>
    </footer>

</body>
</html>
