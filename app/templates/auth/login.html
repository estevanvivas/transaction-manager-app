<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Transacciones – Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0a0a1a] text-white overflow-x-hidden">

    <!-- ═══ Decorative blobs ═══ -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="blob w-[600px] h-[600px] bg-purple-600/20 -top-60 -left-60 animate-pulse-slow"></div>
        <div class="blob w-[500px] h-[500px] bg-blue-600/15 -bottom-40 -right-40 animate-pulse-slow delay-300"></div>
        <div class="blob w-[200px] h-[200px] bg-indigo-500/20 top-1/4 right-1/4 animate-pulse-slow delay-500"></div>
    </div>

    <div class="relative z-10 w-full max-w-md mx-auto px-4 py-10">

        <!-- Logo -->
        <a href="/" class="flex items-center justify-center gap-3 mb-8 animate-fade-in">
            <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
            </div>
            <span class="text-lg font-semibold text-white/80">
                Gestor de Transacciones
            </span>
        </a>

        <!-- Card -->
        <div class="glass rounded-3xl p-8 animate-fade-in-up">

            <!-- Tabs -->
            <div class="flex bg-white/5 rounded-xl p-1 mb-8">
                <button id="login-tab"
                        class="tab-btn active flex-1 py-2.5 text-sm font-medium rounded-lg text-center transition-all">
                    Iniciar Sesión
                </button>
                <button id="register-tab"
                        class="tab-btn flex-1 py-2.5 text-sm font-medium rounded-lg text-center text-white/50 transition-all">
                    Registro
                </button>
            </div>

            <!-- ═══ Login Form ═══ -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-white/60 mb-2">Correo electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </span>
                        <input id="login-email" type="email" required
                               class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm text-white placeholder-white/30 outline-none"
                               placeholder="tu@correo.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-white/60 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <input id="login-password" type="password" required
                               class="input-field w-full pl-12 pr-12 py-3 rounded-xl text-sm text-white placeholder-white/30 outline-none"
                               placeholder="••••••••">
                        <button type="button"
                                class="toggle-password absolute inset-y-0 right-0 pr-4 flex items-center text-white/30 hover:text-white/60 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="btn-primary w-full py-3.5 rounded-xl text-sm font-semibold text-white">
                    Iniciar Sesión
                </button>

                <p class="text-center text-sm text-white/30">
                    ¿No tienes cuenta?
                    <button type="button" onclick="document.getElementById('register-tab').click()"
                            class="text-purple-400 hover:text-purple-300 font-medium transition-colors">
                        Regístrate
                    </button>
                </p>
            </form>

            <!-- ═══ Register Form ═══ -->
            <form id="register-form" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-white/60 mb-2">Nombre de usuario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </span>
                        <input id="reg-username" type="text" required minlength="3" maxlength="10"
                               class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm text-white placeholder-white/30 outline-none"
                               placeholder="usuario123">
                    </div>
                    <p class="text-xs text-white/25 mt-1.5">3-10 caracteres. Solo letras, números y guión bajo.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-white/60 mb-2">Correo electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </span>
                        <input id="reg-email" type="email" required
                               class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm text-white placeholder-white/30 outline-none"
                               placeholder="tu@correo.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-white/60 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <input id="reg-password" type="password" required minlength="8"
                               class="input-field w-full pl-12 pr-12 py-3 rounded-xl text-sm text-white placeholder-white/30 outline-none"
                               placeholder="••••••••">
                        <button type="button"
                                class="toggle-password absolute inset-y-0 right-0 pr-4 flex items-center text-white/30 hover:text-white/60 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <p class="text-xs text-white/25 mt-1.5">Mín. 8 caracteres: mayúscula, minúscula, número y carácter especial.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-white/60 mb-2">Confirmar contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                        </span>
                        <input id="reg-confirm" type="password" required minlength="8"
                               class="input-field w-full pl-12 pr-12 py-3 rounded-xl text-sm text-white placeholder-white/30 outline-none"
                               placeholder="••••••••">
                        <button type="button"
                                class="toggle-password absolute inset-y-0 right-0 pr-4 flex items-center text-white/30 hover:text-white/60 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="btn-primary w-full py-3.5 rounded-xl text-sm font-semibold text-white">
                    Crear Cuenta
                </button>

                <p class="text-center text-sm text-white/30">
                    ¿Ya tienes cuenta?
                    <button type="button" onclick="document.getElementById('login-tab').click()"
                            class="text-purple-400 hover:text-purple-300 font-medium transition-colors">
                        Inicia sesión
                    </button>
                </p>
            </form>
        </div>

        <!-- Back link -->
        <div class="text-center mt-6 animate-fade-in delay-300">
            <a href="/" class="text-sm text-white/30 hover:text-white/60 transition-colors inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Volver al inicio
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
